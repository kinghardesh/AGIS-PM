# =============================================================================
#  Aegis PM – nginx virtual host
#
#  Routing table
#  ─────────────
#  /api/*            → http://api:8000  (FastAPI, strips /api prefix)
#  /health-check     → nginx itself      (Docker healthcheck, no auth)
#  /*                → HITL dashboard   (protected by HTTP Basic Auth)
#
#  Auth
#  ────
#  HTTP Basic Auth protects the entire dashboard.
#  Generate credentials: htpasswd -nb admin yourpassword
#  Then set DASHBOARD_HTPASSWD_HASH in .env and run scripts/gen_htpasswd.sh
# =============================================================================

upstream aegis_api {
    server api:8000;
    keepalive 16;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8000; img-src 'self' data:;"
        always;

    # ── Docker healthcheck (no auth so Docker can probe it) ───────────────────
    location = /health-check {
        access_log off;
        auth_basic off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API proxy (auth handled by FastAPI API keys, not Basic Auth) ──────────
    location /api/ {
        # No Basic Auth on /api – FastAPI enforces X-API-Key instead
        auth_basic off;

        proxy_pass         http://aegis_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
        proxy_buffering       off;
        proxy_cache           off;
    }

    # ── OpenAPI docs (admin only via Basic Auth) ──────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        auth_basic           "Aegis PM – Admin";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass         http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Connection "";
    }

    # ── Agent health status (no auth – for external monitoring probes) ────────
    location = /api/agents/status {
        auth_basic off;
        proxy_pass         http://aegis_api/agents/status;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }

    # ── Static assets (long cache, no auth needed for hashed filenames) ───────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ── HITL Dashboard – protected by Basic Auth ──────────────────────────────
    location / {
        # Basic Auth gate
        auth_basic           "Aegis PM – HITL Dashboard";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Hide dot-files ────────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    error_page 401 /401.html;
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
