<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aegis PM | Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F7F7F5;--surface:#FFFFFF;--surface2:#F0F0EE;
  --border:#E8E8E4;--border2:#D8D8D2;
  --text:#1A1A18;--text2:#6B6B66;--text3:#A8A8A2;
  --accent:#2B5CE6;--accent-light:#EEF2FF;
  --green:#16A34A;--green-light:#F0FDF4;
  --red:#DC2626;--red-light:#FEF2F2;
  --amber:#D97706;--amber-light:#FFFBEB;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --teal:#0891B2;--teal-light:#F0FDFA;
  --sidebar:220px;--header:56px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;height:var(--header);}
.logo-mark{width:28px;height:28px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:16px;height:16px;fill:white;}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.sidebar-section{padding:20px 12px 8px;}
.sidebar-section-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:400;transition:background 0.15s,color 0.15s;margin-bottom:1px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}
.nav-badge{margin-left:auto;background:var(--amber);color:white;font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;font-family:'DM Mono',monospace;}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;}
.user-pill:hover{background:var(--surface2);}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0;}
.user-name{font-size:13px;font-weight:500;color:var(--text);}
.user-role{font-size:11px;color:var(--text3);}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:var(--header);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.page-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.breadcrumb{font-size:13px;color:var(--text3);}
.status-indicator{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:var(--green-light);font-size:12px;font-weight:500;color:var(--green);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.content{padding:28px;flex:1;}

/* METRIC CARDS */
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:all 0.2s;}
.metric-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.06);}
.metric-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.metric-icon svg{width:20px;height:20px;}
.metric-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:6px;}
.metric-value{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--text);letter-spacing:-1px;line-height:1;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px;}
.metric-card.blue .metric-icon{background:var(--accent-light);color:var(--accent);}
.metric-card.amber .metric-icon{background:var(--amber-light);color:var(--amber);}
.metric-card.green .metric-icon{background:var(--green-light);color:var(--green);}
.metric-card.purple .metric-icon{background:var(--purple-light);color:var(--purple);}
.metric-card.teal .metric-icon{background:var(--teal-light);color:var(--teal);}
.metric-card.blue .metric-value{color:var(--accent);}
.metric-card.amber .metric-value{color:var(--amber);}
.metric-card.green .metric-value{color:var(--green);}

/* CHARTS GRID */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;}
.chart-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.chart-card .chart-sub{font-size:11px;color:var(--text3);margin-bottom:20px;}

/* ASSIGNEE TABLE */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;}
.table-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:16px;}
.data-table{width:100%;border-collapse:separate;border-spacing:0;}
.data-table th{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{font-size:13px;color:var(--text);padding:10px 12px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surface2);}
.assignee-cell{display:flex;align-items:center;gap:8px;}
.assignee-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:white;flex-shrink:0;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.status-badge.pending{background:var(--amber-light);color:var(--amber);}
.status-badge.approved{background:var(--green-light);color:var(--green);}
.status-badge.dismissed{background:var(--red-light);color:var(--red);}
.status-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}

/* ACTIVITY FEED */
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;}
.activity-icon.approve{background:var(--green-light);color:var(--green);}
.activity-icon.dismiss{background:var(--red-light);color:var(--red);}
.activity-icon.create{background:var(--accent-light);color:var(--accent);}
.activity-text{font-size:12px;color:var(--text2);}
.activity-text strong{color:var(--text);font-weight:500;}
.activity-time{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:1200px){.metrics-row{grid-template-columns:repeat(3,1fr);}.charts-grid,.bottom-grid{grid-template-columns:1fr;}}
@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}.metrics-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V5L12 1z"/></svg></div>
      <div><div class="logo-name">Aegis PM</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Workspace</div>
      <a class="nav-item" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="/projects.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects & Team
      </a>
      <a class="nav-item" href="/integrations.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Integrations
      </a>
      <a class="nav-item active" href="/analytics.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Agents</div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Monitor
        <span class="nav-badge">ON</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Communicator
        <span class="nav-badge">ON</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar">PM</div>
        <div><div class="user-name">Project Manager</div><div class="user-role">Admin</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="page-title">Analytics</span>
        <span class="breadcrumb">/ Project Intelligence</span>
      </div>
      <div class="status-indicator"><div class="pulse"></div> Live Data</div>
    </header>

    <div class="content" id="main-content">
      <div class="loading" id="loading"><div class="spinner"></div>Loading analytics data...</div>
    </div>
  </div>
</div>

<script>
const API = (location.port === '3000') ? '/api' : 'http://127.0.0.1:8000';
const avatarColors = ['#7C3AED','#2563EB','#059669','#DC2626','#D97706','#0891B2'];
const getColor = name => avatarColors[name.charCodeAt(0)%avatarColors.length];
const initials = name => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

async function loadAnalytics(){
  try{
    const r = await fetch(`${API}/analytics`);
    const data = await r.json();
    renderAnalytics(data);
  } catch(e){
    document.getElementById('main-content').innerHTML = `
      <div class="loading" style="color:var(--red)">
        ⚠ Failed to load analytics — is the backend running?
      </div>`;
  }
}

function renderAnalytics(data){
  const m = data.metrics;
  const content = document.getElementById('main-content');
  
  content.innerHTML = `
    <!-- METRIC CARDS -->
    <div class="metrics-row">
      <div class="metric-card blue">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div class="metric-label">Total Alerts</div>
        <div class="metric-value">${m.total_alerts}</div>
        <div class="metric-sub">All time tracked</div>
      </div>
      <div class="metric-card amber">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="metric-label">Pending Review</div>
        <div class="metric-value">${m.pending}</div>
        <div class="metric-sub">Awaiting HITL decision</div>
      </div>
      <div class="metric-card green">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="metric-label">Resolved</div>
        <div class="metric-value">${m.total_resolved}</div>
        <div class="metric-sub">${m.resolution_rate}% resolution rate</div>
      </div>
      <div class="metric-card purple">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="metric-label">Slack Sent</div>
        <div class="metric-value">${m.slack_notifications_sent}</div>
        <div class="metric-sub">Notifications delivered</div>
      </div>
      <div class="metric-card teal">
        <div class="metric-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <div class="metric-label">Assignees</div>
        <div class="metric-value">${data.assignee_breakdown.length}</div>
        <div class="metric-sub">Unique team members</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Alert Trend — Last 7 Days</h3>
        <p class="chart-sub">Daily alert detection frequency</p>
        <canvas id="trendChart" height="200"></canvas>
      </div>
      <div class="chart-card">
        <h3>Status Distribution</h3>
        <p class="chart-sub">Current breakdown by status</p>
        <canvas id="statusChart" height="200"></canvas>
      </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-grid">
      <div class="table-card">
        <h3>Alerts by Assignee</h3>
        <table class="data-table">
          <thead>
            <tr><th>Assignee</th><th>Total</th><th>Pending</th><th>Resolved</th></tr>
          </thead>
          <tbody id="assignee-tbody"></tbody>
        </table>
        ${data.assignee_breakdown.length === 0 ? '<p style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center;">No data yet — seed alerts from the dashboard</p>' : ''}
      </div>
      <div class="table-card">
        <h3>Recent Activity</h3>
        <div id="activity-feed"></div>
        ${data.recent_activity.length === 0 ? '<p style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center;">No activity yet — approve or dismiss alerts</p>' : ''}
      </div>
    </div>
  `;

  // Render assignee table
  const tbody = document.getElementById('assignee-tbody');
  if(tbody){
    tbody.innerHTML = data.assignee_breakdown.map(a => `
      <tr>
        <td>
          <div class="assignee-cell">
            <div class="assignee-dot" style="background:${getColor(a.assignee)}">${initials(a.assignee)}</div>
            ${a.assignee}
          </div>
        </td>
        <td><strong>${a.total}</strong></td>
        <td>${a.pending > 0 ? `<span class="status-badge pending">${a.pending}</span>` : '—'}</td>
        <td>${(a.approved + a.dismissed + a.notified) > 0 ? `<span class="status-badge approved">${a.approved + a.dismissed + a.notified}</span>` : '—'}</td>
      </tr>
    `).join('');
  }

  // Render activity feed
  const feed = document.getElementById('activity-feed');
  if(feed && data.recent_activity.length > 0){
    feed.innerHTML = data.recent_activity.slice(0, 8).map(a => {
      const iconClass = a.to_status === 'approved' ? 'approve' : a.to_status === 'dismissed' ? 'dismiss' : 'create';
      const icon = a.to_status === 'approved' ? '✓' : a.to_status === 'dismissed' ? '✕' : '＋';
      const time = new Date(a.created_at).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
      return `
        <div class="activity-item">
          <div class="activity-icon ${iconClass}">${icon}</div>
          <div>
            <div class="activity-text">
              <strong>Alert #${a.alert_id}</strong> ${a.from_status ? `${a.from_status} → ` : ''}${a.to_status}
              ${a.notes ? `<br><span style="color:var(--text3)">${a.notes}</span>` : ''}
            </div>
            <div class="activity-time">${time} · by ${a.actor}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Render charts
  renderTrendChart(data.daily_trend);
  renderStatusChart(data.status_distribution);
}

function renderTrendChart(trend){
  const ctx = document.getElementById('trendChart');
  if(!ctx) return;
  
  const gradient = ctx.getContext('2d').createLinearGradient(0,0,0,200);
  gradient.addColorStop(0, 'rgba(43,92,230,0.15)');
  gradient.addColorStop(1, 'rgba(43,92,230,0.01)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: trend.map(d => d.label),
      datasets: [{
        label: 'Alerts',
        data: trend.map(d => d.count),
        borderColor: '#2B5CE6',
        backgroundColor: gradient,
        borderWidth: 2.5,
        fill: true,
        tension: 0.4,
        pointRadius: 4,
        pointBackgroundColor: '#2B5CE6',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1A1A18',
          titleFont: { family: "'DM Sans'", size: 12 },
          bodyFont: { family: "'DM Mono'", size: 11 },
          padding: 10,
          cornerRadius: 8,
          displayColors: false,
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: "'DM Sans'", size: 11 }, color: '#A8A8A2' }
        },
        y: {
          beginAtZero: true,
          grid: { color: '#F0F0EE' },
          ticks: {
            font: { family: "'DM Mono'", size: 11 },
            color: '#A8A8A2',
            stepSize: 1,
          }
        }
      }
    }
  });
}

function renderStatusChart(dist){
  const ctx = document.getElementById('statusChart');
  if(!ctx) return;

  const labels = [], values = [], colors = [], borderColors = [];
  const colorMap = {
    pending:   { bg: '#FFFBEB', border: '#D97706' },
    approved:  { bg: '#F0FDF4', border: '#16A34A' },
    dismissed: { bg: '#FEF2F2', border: '#DC2626' },
    notified:  { bg: '#EEF2FF', border: '#2B5CE6' },
  };

  for(const [status, count] of Object.entries(dist)){
    labels.push(status.charAt(0).toUpperCase() + status.slice(1));
    values.push(count);
    const c = colorMap[status] || { bg: '#F0F0EE', border: '#6B6B66' };
    colors.push(c.border);
    borderColors.push('#fff');
  }

  if(values.length === 0){
    labels.push('No Data');
    values.push(1);
    colors.push('#E8E8E4');
    borderColors.push('#fff');
  }

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            padding: 16,
            usePointStyle: true,
            pointStyle: 'circle',
            font: { family: "'DM Sans'", size: 11 }
          }
        },
        tooltip: {
          backgroundColor: '#1A1A18',
          titleFont: { family: "'DM Sans'", size: 12 },
          bodyFont: { family: "'DM Mono'", size: 11 },
          padding: 10,
          cornerRadius: 8,
        }
      }
    }
  });
}

// Auto-refresh every 30s
loadAnalytics();
setInterval(loadAnalytics, 30000);
</script>
</body>
</html>
