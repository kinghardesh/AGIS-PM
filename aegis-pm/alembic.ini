# =============================================================================
#  Aegis PM – Alembic configuration
#  Run migrations: alembic upgrade head
#  Create new:     alembic revision --autogenerate -m "description"
# =============================================================================

[alembic]
script_location    = migrations
file_template      = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone           = UTC

# SQLAlchemy URL – overridden at runtime from environment variables
# (see migrations/env.py which reads the DB_ env vars directly)
sqlalchemy.url     = postgresql+psycopg2://aegis:aegispassword@localhost:5432/aegispm

[post_write_hooks]
# Optionally run black/isort on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level     = WARN
handlers  =
qualname  = sqlalchemy.engine

[logger_alembic]
level     = INFO
handlers  =
qualname  = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
