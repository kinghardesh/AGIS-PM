# =============================================================================
#  Aegis PM – Docker Compose
#  Version: 2.0
#
#  Services
#  ────────
#  postgres   PostgreSQL 16 – persistent alert storage + audit log
#  api        FastAPI backend – all REST endpoints
#  agents     AutoGen agent runner – Monitor + Communicator (+ GroupChat mode)
#  frontend   Nginx – static HITL dashboard + reverse proxy to API
#
#  Startup order
#  ─────────────
#  postgres (healthy) → api (healthy) → agents
#                                     → frontend
#
#  Usage
#  ─────
#  # Standard start (all services)
#  docker compose up --build
#
#  # Agents only in GroupChat mode
#  AEGIS_MODE=groupchat docker compose up --build
#
#  # Production (no hot-reload, no exposed DB port)
#  docker compose --profile production up --build
#
#  # Development (hot-reload, exposed DB port for local tools)
#  docker compose --profile development up --build
#
#  Profiles
#  ────────
#  (no profile)  = standard mode; API has hot-reload, DB port exposed
#  production    = gunicorn workers, no volume mounts, no exposed DB port
# =============================================================================

name: aegis-pm

# ── Shared defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-api-healthcheck: &api-healthcheck
  test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s


services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: aegis_postgres
    <<: *default-restart
    logging: *default-logging

    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegispassword}
      POSTGRES_DB:       ${POSTGRES_DB:-aegispm}
      # Tune for a small containerised workload
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    ports:
      # Exposed for local dev tools (DBeaver, pgcli, etc.)
      # Override with POSTGRES_HOST_PORT=127.0.0.1:5432 to restrict to loopback
      - "${POSTGRES_HOST_PORT:-5432}:5432"

    volumes:
      # Persistent data volume – survives container rebuilds
      - postgres_data:/var/lib/postgresql/data
      # Schema + seed SQL – runs automatically on first start
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      # Optional: place additional .sql files in db/seeds/ for test data
      # - ./db/seeds:/docker-entrypoint-initdb.d/seeds:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegispm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - aegis-internal

    # Prevent OOM kills from taking down the whole host
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m


  # ═══════════════════════════════════════════════════════════════════════════
  #  FastAPI Backend
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development          # override with --build-arg TARGET=production
      args:
        PYTHON_VERSION: "3.12"
    container_name: aegis_api
    <<: *default-restart
    logging: *default-logging

    depends_on:
      postgres:
        condition: service_healthy

    env_file: .env
    environment:
      # These override anything in .env for Docker networking
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # Disable SQLAlchemy echo in containers (use LOG_LEVEL=DEBUG to re-enable)
      SQLALCHEMY_ECHO: "false"

    ports:
      - "${API_HOST_PORT:-8000}:8000"

    volumes:
      # Hot-reload: mount source so uvicorn --reload picks up changes
      - ./api:/app/api:ro
      - ./db:/app/db:ro

    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/api
        --log-level ${LOG_LEVEL:-info}

    healthcheck: *api-healthcheck

    networks:
      - aegis-internal
      - aegis-frontend        # frontend nginx proxies to this network

    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m


  # ═══════════════════════════════════════════════════════════════════════════
  #  AutoGen Agent Runner
  # ═══════════════════════════════════════════════════════════════════════════
  agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
      args:
        PYTHON_VERSION: "3.12"
    container_name: aegis_agents
    <<: *default-restart
    logging: *default-logging

    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy    # wait for API to be truly ready

    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      API_BASE_URL:  http://api:8000  # internal name resolution
      # AEGIS_MODE: agents            # override with: AEGIS_MODE=groupchat
      # POLL_INTERVAL_SECONDS: 300    # override poll interval

    volumes:
      # Hot-reload for agent development
      - ./agents:/app/agents:ro

    command: python -m agents.runner

    networks:
      - aegis-internal

    deploy:
      resources:
        limits:
          # AutoGen + OpenAI calls can be memory-hungry
          memory: 1g
        reservations:
          memory: 256m


  # ═══════════════════════════════════════════════════════════════════════════
  #  Nginx – HITL Dashboard + API Reverse Proxy
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    image: nginx:1.27-alpine
    container_name: aegis_frontend
    <<: *default-restart
    logging: *default-logging

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

    volumes:
      # Static dashboard files
      - ./frontend:/usr/share/nginx/html:ro
      # Custom nginx config (API proxy + security headers + Basic Auth)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Basic Auth credentials – generate with: bash scripts/gen_htpasswd.sh
      - ./nginx/.htpasswd:/etc/nginx/auth/.htpasswd:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health-check || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3

    networks:
      - aegis-frontend

    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 16m


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Internal: postgres ↔ api ↔ agents (never exposed to host)
  aegis-internal:
    driver: bridge
    internal: true

  # Frontend: nginx ↔ api (exposed to host via port binding on nginx)
  aegis-frontend:
    driver: bridge


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    labels:
      com.aegis.service: "postgres"
      com.aegis.description: "Persistent alert + audit log storage"
